services:
  - type: web
    name: nexen3
    env: node
    plan: free
    healthCheckPath: /api/health
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
