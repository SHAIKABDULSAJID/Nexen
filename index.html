<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>NEXEN - The Tech Professional Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      if (typeof window !== "undefined" && window.tailwind) {
        window.tailwind.config = {
          darkMode: "class",
        };
      } else {
        console.warn("Tailwind CSS CDN did not load; styles may be missing.");
      }
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style type="text/tailwindcss">
      :root {
        scrollbar-gutter: stable;
      }
      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif,
          "Apple Color Emoji",
          "Segoe UI Emoji",
          "Segoe UI Symbol";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        @apply bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-white transition-colors duration-300;
      }
      /* Custom scrollbar for a cleaner look, especially on Windows */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        @apply bg-transparent;
      }
      ::-webkit-scrollbar-thumb {
        @apply bg-slate-300/50 dark:bg-slate-800/50 rounded-full border-2 border-transparent bg-clip-padding transition-colors;
      }
      ::-webkit-scrollbar-thumb:hover {
        @apply bg-slate-400 dark:bg-slate-700;
      }
      /* Firefox support */
      * {
        scrollbar-width: thin;
        scrollbar-color: theme("colors.slate.300") transparent;
      }
      .dark * {
        scrollbar-color: theme("colors.slate.800") transparent;
      }
    </style>
    <link rel="stylesheet" href="/index.css" />
    <script>
      // Guard against dev websocket bootstrap failures causing a blank screen.
      (function () {
        const suppressedMessage = "WebSocket closed without opened.";

        window.addEventListener("error", function (event) {
          const message = String(event?.message || "");
          if (message.includes(suppressedMessage)) {
            event.preventDefault();
          }
        });

        window.addEventListener("unhandledrejection", function (event) {
          const reason = event?.reason;
          const message =
            typeof reason === "string"
              ? reason
              : String(reason?.message || reason || "");

          if (message.includes(suppressedMessage)) {
            event.preventDefault();
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
